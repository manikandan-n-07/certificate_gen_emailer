<h2>Certificate Preview</h2>

{% for p in people %}
  <div style="margin-bottom:25px">
    <embed src="{{ url_for('static', filename='generated/' + p.preview) }}" width="600"><br>
    <b>{{ p.name }}</b> — {{ p.email }}
  </div>
{% endfor %}

<a href="/email"><button>Next → Email</button></a>
