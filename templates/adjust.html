<h2>Adjust Certificate Text (Live)</h2>

<!-- Live Preview Image -->
<img id="img"
     src="{{ url_for('static', filename='live_preview.png') }}"
     width="900"
     data-x="{{ x }}"
     data-y="{{ y }}"
     data-fs="{{ fs }}"
><br><br>

<!-- X POSITION -->
<b>X Position:</b>
<button onclick="step('x', -10)">➖</button>
<input type="number" id="xInput" value="{{ x }}" style="width:80px;">
<button onclick="step('x', 10)">➕</button>
<br><br>

<!-- Y POSITION -->
<b>Y Position:</b>
<button onclick="step('y', -10)">➖</button>
<input type="number" id="yInput" value="{{ y }}" style="width:80px;">
<button onclick="step('y', 10)">➕</button>
<br><br>

<!-- FONT SIZE -->
<b>Font Size:</b>
<button onclick="step('fs', -2)">➖</button>
<input type="number" id="fsInput" value="{{ fs }}" style="width:80px;">
<button onclick="step('fs', 2)">➕</button>
<br><br>

<!-- FONT COLOR -->
<b>Font Color:</b>
<input type="color" id="color" value="#000000">
<br><br>

<form action="/preview" method="POST">
  <button type="submit">Generate Certificates</button>
</form>

<script>
const img = document.getElementById("img");
const color = document.getElementById("color");

const xInput = document.getElementById("xInput");
const yInput = document.getElementById("yInput");
const fsInput = document.getElementById("fsInput");

// Read initial values safely
let x = parseInt(img.dataset.x);
let y = parseInt(img.dataset.y);
let fs = parseInt(img.dataset.fs);

// Update preview
function updatePreview() {
  x = parseInt(xInput.value);
  y = parseInt(yInput.value);
  fs = parseInt(fsInput.value);

  fetch(`/live?x=${x}&y=${y}&fs=${fs}&color=${color.value}`)
    .then(() => {
      img.src = "{{ url_for('static', filename='live_preview.png') }}?t=" + Date.now();
    });
}

// Plus / Minus buttons
function step(type, value) {
  if (type === "x") xInput.value = parseInt(xInput.value) + value;
  if (type === "y") yInput.value = parseInt(yInput.value) + value;
  if (type === "fs") fsInput.value = parseInt(fsInput.value) + value;
  updatePreview();
}

// Manual typing
xInput.oninput = updatePreview;
yInput.oninput = updatePreview;
fsInput.oninput = updatePreview;
color.oninput = updatePreview;
</script>
